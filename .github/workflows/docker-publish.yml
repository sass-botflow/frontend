name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://www.botflow.ink
            NEXT_PUBLIC_API_URL=https://api.botflow.ink
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/onboarding
            NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL=/en
            APP_VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EasyPanel
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e

          if [ -n "$WEBHOOK" ]; then
            echo "Triggering EasyPanel deploy webhook..."
            curl -fsS -X POST "$WEBHOOK"
            echo "EasyPanel deploy triggered."
            exit 0
          fi

          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_KEY" ]; then
            echo "Deploying via SSH to $SSH_HOST ..."
            mkdir -p ~/.ssh
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" <<'REMOTE'
          set -e
          echo "=== BotFlow deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          docker pull ghcr.io/sass-botflow/frontend:latest
          CONTAINER=$(docker ps --format '{{.Names}}' | grep -iE 'frontend|botflow' | head -1 || true)
          if [ -z "$CONTAINER" ]; then
            echo "No running frontend container."
            docker ps -a
            exit 1
          fi
          docker restart "$CONTAINER"
          sleep 8
          docker logs "$CONTAINER" --tail 15 2>&1 || true
          echo "=== Deploy finished ==="
          REMOTE
            exit 0
          fi

          {
            echo "## Image published — manual deploy required"
            echo ""
            echo "Docker image \`ghcr.io/sass-botflow/frontend:latest\` is ready."
            echo ""
            echo "### EasyPanel (1 click)"
            echo "1. EasyPanel → \`sass-botflow\` → \`frontend\`"
            echo "2. Source = **Docker Image**: \`ghcr.io/sass-botflow/frontend:latest\`"
            echo "3. Click **Restart**"
            echo ""
            echo "### Auto deploy next time"
            echo "Add GitHub secret \`EASYPANEL_DEPLOY_WEBHOOK\` (EasyPanel → Deployments → Webhook)"
            echo "or SSH secrets: \`DEPLOY_SSH_HOST\`, \`DEPLOY_SSH_USER\`, \`DEPLOY_SSH_KEY\`"
            echo ""
            echo "Verify: \`curl https://www.botflow.ink/api/health\`"
          } >> "$GITHUB_STEP_SUMMARY"
