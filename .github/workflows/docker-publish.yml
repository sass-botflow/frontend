name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://www.botflow.ink
            NEXT_PUBLIC_API_URL=https://api.botflow.ink
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/onboarding
            NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL=/en
            APP_VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EasyPanel
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e

          if [ -n "$WEBHOOK" ]; then
            echo "Triggering EasyPanel deploy webhook..."
            curl -fsS -X POST "$WEBHOOK"
            echo "EasyPanel deploy triggered."
            exit 0
          fi

          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_KEY" ]; then
            echo "Deploying via SSH to $SSH_HOST ..."
            mkdir -p ~/.ssh
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" <<'REMOTE'
          set -e
          echo "=== BotFlow deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          docker pull ghcr.io/sass-botflow/frontend:latest
          CONTAINER=$(docker ps --format '{{.Names}}' | grep -iE 'frontend|botflow' | head -1 || true)
          if [ -z "$CONTAINER" ]; then
            echo "No running frontend container."
            docker ps -a
            exit 1
          fi
          docker restart "$CONTAINER"
          sleep 8
          docker logs "$CONTAINER" --tail 15 2>&1 || true
          echo "=== Deploy finished ==="
          REMOTE
            exit 0
          fi

          {
            echo "## ⚠️ Image published — server NOT updated"
            echo ""
            echo "Docker image \`ghcr.io/sass-botflow/frontend:latest\` is ready but **EasyPanel was not triggered**."
            echo ""
            echo "### Fix once (5 min) — see [DEPLOY-FACILE.md](https://github.com/sass-botflow/frontend/blob/main/DEPLOY-FACILE.md)"
            echo ""
            echo "1. EasyPanel → \`frontend\` → **Deployments** → copy **Deployment Trigger** URL"
            echo "   (format: \`http://187.124.12.89:3000/api/deploy/xxxxxxxx\`)"
            echo "2. GitHub → **Settings → Webhooks → Add webhook**"
            echo "   - Payload URL = Deployment Trigger URL"
            echo "   - SSL verification = **Disable**"
            echo "   - Events = **push**"
            echo "3. EasyPanel source = **Docker Image** \`ghcr.io/sass-botflow/frontend:latest\`"
            echo ""
            echo "Or add GitHub Actions secret \`EASYPANEL_DEPLOY_WEBHOOK\` with the same URL."
            echo ""
            echo "Verify after deploy: \`curl https://www.botflow.ink/api/health\` — version must not be \`dev\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Manual deploy required — configure EasyPanel webhook (see DEPLOY-FACILE.md)"
          exit 1
