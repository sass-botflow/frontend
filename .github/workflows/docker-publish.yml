name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://www.botflow.ink
            NEXT_PUBLIC_API_URL=https://api.botflow.ink
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/onboarding
            NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL=/en
            APP_VERSION=${{ github.sha }}
            GITHUB_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Make GHCR package public (EasyPanel pull)
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          PKG: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          for BASE in "orgs/${OWNER}" "users/${OWNER}"; do
            CODE=$(curl -sS -o /tmp/pkg.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/${BASE}/packages/container/${PKG}" \
              -d '{"visibility":"public"}')
            echo "${BASE}: HTTP ${CODE}"
            if [ "$CODE" = "200" ]; then
              echo "GHCR package is public — EasyPanel can pull without registry credentials."
              cat /tmp/pkg.json
              exit 0
            fi
          done
          echo "::warning::GHCR still private. EasyPanel: use GitHub Source (see DEPLOY-DABA.md) OR add GH_PACKAGES_ADMIN_TOKEN secret OR make package Public manually."

      - name: Verify GHCR is publicly pullable
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/latest")
          echo "Anonymous GHCR pull check: HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            echo "::warning::GHCR image NOT public (HTTP ${CODE}). EasyPanel Docker Image deploy will fail. Use GitHub Source — DEPLOY-DABA.md"
          fi

      - name: Publish to Docker Hub (public mirror, optional)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Docker Hub credentials not configured — skipping public mirror."
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker pull "ghcr.io/${{ github.repository }}:latest"
          docker tag "ghcr.io/${{ github.repository }}:latest" \
            "${DOCKERHUB_USERNAME}/botflow-frontend:latest"
          docker push "${DOCKERHUB_USERNAME}/botflow-frontend:latest"
          echo "Public image: docker.io/${DOCKERHUB_USERNAME}/botflow-frontend:latest"

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EasyPanel
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK || vars.EASYPANEL_DEPLOY_WEBHOOK }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e

          if [ -n "$WEBHOOK" ]; then
            echo "Triggering EasyPanel deploy webhook..."
            curl -fsS -X POST "$WEBHOOK"
            echo "EasyPanel deploy triggered."
            exit 0
          fi

          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_KEY" ]; then
            echo "Deploying via SSH to $SSH_HOST ..."
            mkdir -p ~/.ssh
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" <<'REMOTE'
          set -e
          echo "=== BotFlow deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          docker pull ghcr.io/sass-botflow/frontend:latest
          CONTAINER=$(docker ps --format '{{.Names}}' | grep -iE 'frontend|botflow' | head -1 || true)
          if [ -z "$CONTAINER" ]; then
            echo "No running frontend container."
            docker ps -a
            exit 1
          fi
          docker restart "$CONTAINER"
          sleep 8
          docker logs "$CONTAINER" --tail 15 2>&1 || true
          echo "=== Deploy finished ==="
          REMOTE
            exit 0
          fi

          {
            echo "## ⚠️ Image published — server NOT updated"
            echo ""
            echo "Docker image \`ghcr.io/sass-botflow/frontend:latest\` is ready but **EasyPanel was not triggered**."
            echo ""
            echo "### Fix — EasyPanel Source = GitHub (not Docker Image)"
            echo "GHCR is private. See [DEPLOY-DABA.md](https://github.com/sass-botflow/frontend/blob/main/DEPLOY-DABA.md)"
            echo ""
            echo "1. EasyPanel → \`frontend\` → **Source** → **GitHub** → \`sass-botflow/frontend\` → \`main\` → Dockerfile"
            echo "2. Environment: CLERK keys + JWT_SECRET + NEXT_PUBLIC_* (see DEPLOY-DABA.md)"
            echo "3. **Deploy** — wait 3-5 min"
            echo ""
            echo "Or: EasyPanel → **Deployments** → webhook → [Deploy now (paste webhook)](https://github.com/sass-botflow/frontend/actions/workflows/deploy-now.yml)"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Image ready — run 'Deploy now (paste webhook)' or configure webhook (DEPLOY-FACILE.md)"
          exit 0

  verify:
    needs: [publish, deploy]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify production routes
        run: |
          chmod +x scripts/verify-production.sh
          sleep 30
          ./scripts/verify-production.sh || {
            echo "::warning::Production verification failed — see script output. Common fix: add botflow.ink domain in EasyPanel."
            exit 0
          }
