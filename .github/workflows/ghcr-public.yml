name: Make GHCR package public

# Run manually if EasyPanel shows "pull access denied".
# After this, EasyPanel can pull ghcr.io/sass-botflow/frontend:latest without credentials.

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: Set package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          for BASE in "orgs/${OWNER}" "users/${OWNER}"; do
            CODE=$(curl -sS -o /tmp/pkg.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/${BASE}/packages/container/${PKG}" \
              -d '{"visibility":"public"}')
            echo "${BASE}: HTTP ${CODE}"
            if [ "$CODE" = "200" ]; then
              echo "✅ Package is now PUBLIC"
              cat /tmp/pkg.json
              exit 0
            fi
          done
          echo "::error::Failed to set package public. Do it manually: GitHub → Packages → frontend → Package settings → Change visibility → Public"
          exit 1

      - name: Verify anonymous pull
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/latest")
          echo "Anonymous manifest check: HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            echo "::warning::Image may still require auth (HTTP ${CODE}). Wait 1 min and retry, or set public manually."
          else
            echo "✅ Image pullable without credentials"
          fi
