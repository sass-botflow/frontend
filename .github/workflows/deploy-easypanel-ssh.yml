name: Deploy to EasyPanel server

# Manual deploy. Push-to-main auto-deploy runs in "Publish Docker image".
# Secrets (pick one):
#   EASYPANEL_DEPLOY_WEBHOOK — EasyPanel → service → Deployments → Webhook URL
#   DEPLOY_SSH_HOST + DEPLOY_SSH_USER + DEPLOY_SSH_KEY

on:
  workflow_dispatch:
    inputs:
      easypanel_webhook:
        description: "Optional — paste Deployment Trigger URL (overrides secret)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EasyPanel
        env:
          WEBHOOK: ${{ inputs.easypanel_webhook || secrets.EASYPANEL_DEPLOY_WEBHOOK || vars.EASYPANEL_DEPLOY_WEBHOOK }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e

          if [ -n "$WEBHOOK" ]; then
            echo "Triggering EasyPanel deploy webhook..."
            curl -fsS -X POST "$WEBHOOK"
            echo "EasyPanel deploy triggered."
            exit 0
          fi

          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_KEY" ]; then
            echo "Deploying via SSH to $SSH_HOST ..."
            mkdir -p ~/.ssh
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" <<'REMOTE'
          set -e
          echo "=== BotFlow deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          docker pull ghcr.io/sass-botflow/frontend:latest
          CONTAINER=$(docker ps --format '{{.Names}}' | grep -iE 'frontend|botflow' | head -1 || true)
          if [ -z "$CONTAINER" ]; then
            echo "No running frontend container."
            docker ps -a
            exit 1
          fi
          echo "Restarting container: $CONTAINER"
          docker restart "$CONTAINER"
          sleep 8
          docker logs "$CONTAINER" --tail 15 2>&1 || true
          echo "=== Deploy finished ==="
          REMOTE
            exit 0
          fi

          echo "::error::No deploy webhook configured."
          {
            echo "## Deploy secrets missing"
            echo ""
            echo "### As7al — paste webhook (bla secrets)"
            echo "Actions → **[Deploy now (paste webhook)](https://github.com/sass-botflow/frontend/actions/workflows/deploy-now.yml)** → Run workflow"
            echo ""
            echo "### Easiest auto — GitHub Webhook (no Actions secrets)"
            echo "1. EasyPanel → \`frontend\` → **Deployments** → **Deployment Trigger** URL"
            echo "   (\`http://187.124.12.89:3000/api/deploy/xxxxxxxx\`)"
            echo "2. GitHub → Settings → Webhooks → Add webhook (push event, SSL off)"
            echo ""
            echo "See [DEPLOY-FACILE.md](https://github.com/sass-botflow/frontend/blob/main/DEPLOY-FACILE.md)"
            echo ""
            echo "### Or — Actions secret"
            echo "GitHub secret: \`EASYPANEL_DEPLOY_WEBHOOK\` = same Deployment Trigger URL"
            echo ""
            echo "### Or — SSH"
            echo "- \`DEPLOY_SSH_HOST\` = \`187.124.12.89\`"
            echo "- \`DEPLOY_SSH_USER\` = \`root\`"
            echo "- \`DEPLOY_SSH_KEY\` = private SSH key"
            echo ""
            echo "### Manual (no secrets)"
            echo "EasyPanel → \`frontend\` → **Restart**"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
