name: Deploy to EasyPanel server

# Manual deploy only. Push-to-main auto-deploy runs in "Publish Docker image".
# Secrets (pick one method):
#   EASYPANEL_DEPLOY_WEBHOOK — easiest: EasyPanel → service → Deployments → Webhook URL
#   DEPLOY_SSH_HOST + DEPLOY_SSH_USER + DEPLOY_SSH_KEY — SSH pull + restart

on:
  workflow_dispatch:

jobs:
  deploy-webhook:
    if: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel deploy
        run: |
          curl -fsS -X POST "${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}"
          echo "EasyPanel deploy triggered."

  deploy-ssh:
    if: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK == '' && secrets.DEPLOY_SSH_HOST != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest image and restart frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== BotFlow deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
            docker pull ghcr.io/sass-botflow/frontend:latest
            CONTAINER=$(docker ps --format '{{.Names}}' | grep -iE 'frontend|botflow' | head -1 || true)
            if [ -z "$CONTAINER" ]; then
              echo "No running frontend container. All containers:"
              docker ps -a
              exit 1
            fi
            echo "Restarting container: $CONTAINER"
            docker restart "$CONTAINER"
            sleep 8
            docker logs "$CONTAINER" --tail 15 2>&1 || true
            echo "=== Deploy finished ==="

  deploy-missing-secrets:
    if: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK == '' && secrets.DEPLOY_SSH_HOST == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain how to enable auto deploy
        run: |
          echo "::error::No deploy secrets configured."
          {
            echo "## Deploy secrets missing"
            echo ""
            echo "Add **one** of these in GitHub → Settings → Secrets → Actions:"
            echo ""
            echo "### Easiest — EasyPanel webhook"
            echo "1. EasyPanel → \`sass-botflow\` → \`frontend\` → **Deployments** → copy **Webhook** URL"
            echo "2. GitHub secret name: \`EASYPANEL_DEPLOY_WEBHOOK\`"
            echo ""
            echo "### Or — SSH"
            echo "- \`DEPLOY_SSH_HOST\` = \`187.124.12.89\`"
            echo "- \`DEPLOY_SSH_USER\` = \`root\`"
            echo "- \`DEPLOY_SSH_KEY\` = private SSH key"
            echo ""
            echo "### Manual deploy (no secrets)"
            echo "EasyPanel → \`frontend\` → **Restart** (source = Docker Image \`ghcr.io/sass-botflow/frontend:latest\`)"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
