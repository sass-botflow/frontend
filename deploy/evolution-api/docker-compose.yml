name: botflow-evolution

# EasyPanel Compose — deploy/evolution-api/docker-compose.yml
# Environment (3 vars ONLY): SERVER_URL, AUTHENTICATION_API_KEY, DATABASE_CONNECTION_URI
# See DEPLOY-ALL-DABA.md

services:
  evolution-db-init:
    image: postgres:16-alpine
    container_name: botflow_evolution_db_init
    restart: "no"
    environment:
      PGUSER: botflow
      PGPASSWORD: botflow
      PGHOST: sass-botflow_postgres
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Postgres at $$PGHOST..."
        until pg_isready -h "$$PGHOST" -U "$$PGUSER" -d postgres; do sleep 2; done
        EXISTS=$$(psql -h "$$PGHOST" -U "$$PGUSER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='evolution'")
        if [ "$$EXISTS" != "1" ]; then
          echo "Creating database evolution..."
          psql -h "$$PGHOST" -U "$$PGUSER" -d postgres -c "CREATE DATABASE evolution;"
        else
          echo "Database evolution already exists."
        fi
        echo "DB init done."

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: botflow_evolution_api
    restart: unless-stopped
    depends_on:
      evolution-db-init:
        condition: service_completed_successfully
      evolution-redis:
        condition: service_healthy
    environment:
      SERVER_URL: ${SERVER_URL}
      SERVER_PORT: "8080"
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI}
      DATABASE_CONNECTION_CLIENT_NAME: botflow_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/1
      CACHE_REDIS_PREFIX_KEY: botflow_evolution
      WEBSOCKET_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LOG_LEVEL: ERROR,WARN,INFO
      LANGUAGE: en
    volumes:
      - evolution_instances:/evolution/instances
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  evolution-redis:
    image: redis:7-alpine
    container_name: botflow_evolution_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  evolution_instances:
    name: botflow_evolution_instances
  evolution_redis_data:
    name: botflow_evolution_redis_data
