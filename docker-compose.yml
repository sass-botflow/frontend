# Local dev only — frontend service (EasyPanel uses Dockerfile directly, not this file).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_local}
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me-min-32-chars}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_local}
